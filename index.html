<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カレンダー</title>
<!-- 祝日ライブラリ（最新版・確実に動く） -->
<script src="https://cdn.jsdelivr.net/npm/japanese-holidays/lib/japanese-holidays.min.js"></script>
<style>
  body {    font-family: sans-serif;    margin: 0;    padding: 20px;  }
  body.light {    background: #ffffff;    color: #333;  }
  body.dark {    background: #222;    color: #eee;  }
  #controls {    display: flex;    gap: 10px;    margin-bottom: 10px;  }
  table {    width: 100%;    border-collapse: collapse;    margin-top: 10px;  }
  th {    padding: 8px;    background: #ddd;    font-size: 16px;  }
  td {    width: 14.2%;    height: 70px;    text-align: center;    vertical-align: top;    padding: 4px;    border: 1px solid #ccc;  }
  .day-cell {    font-size: 20px;    position: relative;  }
  .empty {    background: #f0f0f0;  }
  .sunday {    color: red;  }
  .saturday {    color: blue;  }
  .today {    background: orange;    color: white !important;    border-radius: 4px;    font-weight: bold;  }
  .holiday {    color: red !important;    font-weight: bold;  }
  .holiday-name {    display: block;    font-size: 10px;    margin-top: 2px;  }
  #clock {    margin-top: 10px;    font-size: 24px;  }
</style>
</head>
<body class="light">
<div id="controls">
  <button id="themetoggle">Dark / Light</button>
  <button id="prevmonth">＜</button>
  <span id="monthtitle"></span>
  <button id="nextmonth">＞</button>
  <button id="todaybtn">今日</button>
</div>
<table>
  <thead>
    <tr>
      <th>日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th>
    </tr>
  </thead>
  <tbody id="calendarbody"></tbody>
</table>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const themeToggle = document.getElementById("themetoggle");
  const todayBtn = document.getElementById("todaybtn");
  const prevMonthBtn = document.getElementById("prevmonth");
  const nextMonthBtn = document.getElementById("nextmonth");
  const monthTitle = document.getElementById("monthtitle");
  const calendarBody = document.getElementById("calendarbody");
  const clockEl = document.getElementById("clock");

  let currentDate = new Date();

  themeToggle.addEventListener("click", () => {
    document.body.classList.toggle("dark");
    document.body.classList.toggle("light");
  });

  function renderCalendar(date) {
    calendarBody.innerHTML = "";

    const year = date.getFullYear();
    const month = date.getMonth();

    monthTitle.textContent = `${year}年${month + 1}月`;

    const firstDayIndex = new Date(year, month, 1).getDay();
    const lastDay = new Date(year, month + 1, 0).getDate();

    let dateCounter = 1;
    const today = new Date();

    for (let i = 0; i < 6; i++) {
      const row = document.createElement("tr");
      let hasCells = false;

      for (let j = 0; j < 7; j++) {
        const cell = document.createElement("td");

        if (i === 0 && j < firstDayIndex) {
          cell.classList.add("day-cell", "empty");
        } else if (dateCounter > lastDay) {
          cell.classList.add("day-cell", "empty");
        } else {
          hasCells = true;
          const loopDate = new Date(year, month, dateCounter);
          cell.classList.add("day-cell");

          const dateText = document.createElement("span");
          dateText.textContent = dateCounter;
          cell.appendChild(dateText);

          if (j === 0) cell.classList.add("sunday");
          if (j === 6) cell.classList.add("saturday");

          if (
            year === today.getFullYear() &&
            month === today.getMonth() &&
            dateCounter === today.getDate()
          ) {
            cell.classList.add("today");
          }

          if (typeof window.JapaneseHolidays !== "undefined") {
            const holidayName = window.JapaneseHolidays.isHoliday(loopDate);
            if (holidayName) {
              cell.classList.add("holiday");
              const label = document.createElement("span");
              label.classList.add("holiday-name");
              label.textContent = holidayName;
              cell.appendChild(label);
            }
          }

          dateCounter++;
        }

        row.appendChild(cell);
      }

      if (!hasCells && i > 0) break;
      calendarBody.appendChild(row);
    }
  }

  prevMonthBtn.addEventListener("click", () => {
    currentDate.setMonth(currentDate.getMonth() - 1);
    renderCalendar(currentDate);
  });

  nextMonthBtn.addEventListener("click", () => {
    currentDate.setMonth(currentDate.getMonth() + 1);
    renderCalendar(currentDate);
  });

  todayBtn.addEventListener("click", () => {
    currentDate = new Date();
    renderCalendar(currentDate);
  });

  renderCalendar(currentDate);
});
</script>

</body>
</html>
